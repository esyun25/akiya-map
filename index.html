<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空き家レポーター マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #0f1117; color: #e0e0e0; }
  #header {
    background: linear-gradient(135deg, #1a1d2e 0%, #0f1117 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 1000;
  }
  #header h1 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .legend { display: flex; gap: 16px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-approved { background: #f44336; }
  .dot-review { background: #ffb300; }
  #map { width: 100%; height: calc(100dvh - 52px); }
  .leaflet-popup-content-wrapper {
    background: #1a1d2e !important; color: #e0e0e0 !important;
    border-radius: 10px !important; border: 1px solid rgba(255,255,255,0.08) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    font-family: 'Noto Sans JP', sans-serif !important;
  }
  .leaflet-popup-tip { background: #1a1d2e !important; }
  .popup-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  .popup-status {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 20px; font-weight: 700; margin-bottom: 4px;
  }
  .status-approved { background: rgba(244,67,54,0.15); color: #f44336; }
  .status-review { background: rgba(255,179,0,0.15); color: #ffb300; }
  .popup-date { font-size: 11px; color: #888; }
  .popup-link { font-size: 11px; margin-top: 4px; }
  .popup-link a { color: #5DCAA5; text-decoration: none; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2000; background: #1a1d2e; padding: 20px 32px;
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); font-size: 14px; display: none;
  }
  #error-banner {
    display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 2000; background: rgba(244,67,54,0.9); color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; max-width: 90%; text-align: center;
  }
  .count-badge { background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div id="header">
  <h1>空き家マップ</h1>
  <div class="legend">
    <span class="count-badge" id="count">-- 件</span>
    <div class="legend-item"><span class="legend-dot dot-approved"></span>承認済</div>
    <div class="legend-item"><span class="legend-dot dot-review"></span>審査中</div>
  </div>
</div>
<div id="map"></div>
<div id="loading">読み込み中...</div>
<div id="error-banner"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ====================================================================
// https://docs.google.com/spreadsheets/d/1qFlqgMB-3TfE4tfl5k7SQSWAugm1V7FIz9kB2-LjYEc/edit?usp=sharing
// ====================================================================
var SHEET_CSV_URL = 'YOUR_PUBLISHED_CSV_URL';

// 列番号（0始まり） - スプレッドシートの実際の並びに対応
var COL_TIMESTAMP = 0;    // A
var COL_PREF = 3;         // D: 都道府県
var COL_CITY_START = 4;   // E〜I: 市区町村（5列）
var COL_CITY_END = 8;
var COL_MAPS_URL = 9;     // J: Google MapsのURL
var COL_LAT = 23;         // X: 緯度
var COL_LNG = 24;         // Y: 経度
var COL_STATUS = 25;      // Z: ステータス

var map = L.map('map').setView([35.6812, 139.7671], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
}).addTo(map);

function createIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:' + color +
          ';border:2px solid rgba(255,255,255,0.8);box-shadow:0 0 8px ' + color + '88;"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10]
  });
}

var iconApproved = createIcon('#f44336');
var iconReview = createIcon('#ffb300');

function loadData() {
  var el = document.getElementById('loading');
  el.style.display = 'block';

  Papa.parse(SHEET_CSV_URL, {
    download: true,
    skipEmptyLines: true,
    complete: function(results) {
      el.style.display = 'none';
      var rows = results.data;
      if (rows.length < 2) return;

      var count = 0;
      var bounds = [];

      for (var i = 1; i < rows.length; i++) {
        var r = rows[i];
        var lat = parseFloat(r[COL_LAT]);
        var lng = parseFloat(r[COL_LNG]);
        var status = (r[COL_STATUS] || '').trim();

        if (isNaN(lat) || isNaN(lng)) continue;
        if (status !== '承認' && status !== '審査中' && status !== '未審査') continue;

        var displayStatus = (status === '未審査') ? '審査中' : status;
        var icon = (status === '承認') ? iconApproved : iconReview;
        var statusClass = (displayStatus === '承認') ? 'status-approved' : 'status-review';

        var pref = r[COL_PREF] || '';
        var city = '';
        for (var c = COL_CITY_START; c <= COL_CITY_END; c++) {
          if (r[c]) { city = r[c]; break; }
        }

        var mapsUrl = r[COL_MAPS_URL] || '';
        var timestamp = r[COL_TIMESTAMP] || '';

        var popup = '<div class="popup-status ' + statusClass + '">' + displayStatus + '</div>' +
                    '<div class="popup-title">' + pref + ' ' + city + '</div>' +
                    '<div class="popup-date">' + timestamp + '</div>' +
                    (mapsUrl ? '<div class="popup-link"><a href="' + mapsUrl + '" target="_blank">Google Mapsで開く</a></div>' : '');

        L.marker([lat, lng], {icon: icon}).addTo(map).bindPopup(popup);
        bounds.push([lat, lng]);
        count++;
      }

      document.getElementById('count').textContent = count + ' 件';
      if (bounds.length > 0) map.fitBounds(bounds, {padding: [40, 40]});
    },
    error: function() {
      el.style.display = 'none';
      var banner = document.getElementById('error-banner');
      banner.textContent = 'データの読み込みに失敗しました。URLを確認してください。';
      banner.style.display = 'block';
    }
  });
}

loadData();
setInterval(function() {
  map.eachLayer(function(layer) { if (layer instanceof L.Marker) map.removeLayer(layer); });
  loadData();
}, 5 * 60 * 1000);
</script>
</body>
</html>
